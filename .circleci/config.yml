version: 2.1

orbs:
  python: circleci/python@1.2

workflows:
  build:
    jobs:
      - build-312
      - build-310
      - build-309
      - build-308
      - build-307
      - build-306

jobs:
  build-312:
    docker:
      - image: cimg/python:3.12
      - image: cimg/postgres:14.18-postgis
        auth:
          username: mydockerhub-user
          password: $DOCKERHUB_PASSWORD  # context / project UI env-var reference
        environment:
          POSTGRES_USER: root
          POSTGRES_DB: circle_test
          POSTGRES_PASSWORD: ""
    steps:
      - checkout
      - restore_cache:
          key: venv-312-{{ .Branch }}-{{ checksum "requirements.txt" }}-dep
      - run:
          name: Build and validate
          command: |
            python3 -m venv --copies /home/circleci/venv
            . /home/circleci/venv/bin/activate
            pip install -U pip
            pip install wheel
            pip install -r requirements.txt --progress-bar off
            cd ..
            mv project lists_manager
            mkdir django
            cd django
            django-admin startproject lm
            mv ../lists_manager lm
            cd lm
            cp lists_manager/.circleci/circle_settings.py lm/settings.py
            python manage.py migrate
            python manage.py test
            cp lists_manager/.pylintrc .
            pylint lists_manager
            bandit -r .
      - save_cache:
          key: venv-312-{{ .Branch }}-{{ checksum "/home/circleci/django/du/docker_utils/requirements.txt" }}
          paths:
            - "/home/circleci/venv"
      - store_test_results:
          path: test-results/
      - store_artifacts:
          path: test-reports/
          destination: python_app

